            4. 简答题答题模板

            5. 关键词清单

            6. 3分钟速记版


            要求：

            - 语言简洁

            - 适合直接背诵

            - 有层次感

            - 不要写成大段散文

            - 尽量用“总-分-总”的答题结构'
